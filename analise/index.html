<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF7F2;--warm:#F5EFE4;--dark:#1C1410;
  --gold:#C4973A;--gold-pale:#FAEEDA;
  --green:#1D6B4F;--green-pale:#E1F5EE;
  --purple:#4A3580;--purple-pale:#EEEDFE;
  --rose:#C4537E;--rose-pale:#FBEAF0;
  --text:#1A1210;--text-sec:#3A2E20;--text-ter:#7A6A54;--border:#E8DDD0;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 1rem 2rem}
.header{text-align:center;padding:1.75rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem;position:relative}
.header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:3px;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:0 0 4px 4px}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--dark);letter-spacing:0.02em}
.logo span{color:var(--green)}
.tagline{font-size:11px;color:var(--text-ter);margin-top:5px;letter-spacing:0.06em;text-transform:uppercase}
.progress{display:flex;gap:4px;justify-content:center;margin:0.75rem 0 0}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:all .4s ease}
.dot.done{background:var(--green)}.dot.active{background:var(--gold);transform:scale(1.4)}
.chat{flex:1;display:flex;flex-direction:column;gap:12px;padding:0.5rem 0 1.5rem}
.msg{max-width:88%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65;animation:fadeUp .35s ease forwards;opacity:0}
.msg.bot{background:#fff;color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 2px 8px rgba(28,20,16,0.05)}
.msg.user{background:linear-gradient(135deg,var(--dark),#3A2810);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:4px;animation:fadeUp .35s ease forwards;opacity:0}
.opt{background:#fff;border:1px solid var(--border);border-radius:12px;padding:11px 15px;font-size:13.5px;color:var(--dark);cursor:pointer;text-align:left;transition:all .2s ease;display:flex;align-items:flex-start;gap:11px;font-family:'DM Sans',sans-serif}
.opt:hover{border-color:var(--gold);background:var(--warm);transform:translateX(3px)}
.opt-label{font-weight:500}.opt-desc{font-size:11.5px;color:var(--text-ter);margin-top:2px}
.name-input{display:flex;gap:8px;animation:fadeUp .35s ease forwards;opacity:0}
.name-input input{flex:1;padding:11px 15px;border:1px solid var(--border);border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--dark);outline:none;transition:border-color .2s}
.name-input input:focus{border-color:var(--gold)}
.name-input button{padding:11px 18px;background:linear-gradient(135deg,var(--dark),#3A2810);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s}
.name-input button:hover{opacity:.9}
.loading{display:flex;gap:5px;align-items:center;padding:12px 16px;background:#fff;border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;align-self:flex-start;animation:fadeUp .3s ease forwards;opacity:0}
.loading span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:bounce .9s infinite}
.loading span:nth-child(2){animation-delay:.18s}.loading span:nth-child(3){animation-delay:.36s}
.badge-wrap{animation:fadeUp .3s ease forwards;opacity:0}
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:4px;letter-spacing:0.06em;text-transform:uppercase}
.bp{background:var(--purple-pale);color:#3C3489}.bt{background:var(--green-pale);color:#085041}
.ba{background:var(--gold-pale);color:#633806}.bv{background:var(--rose-pale);color:#8B2252}
.result{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-top:6px;font-size:13.5px;line-height:1.85;color:var(--text);box-shadow:0 4px 24px rgba(29,107,79,0.08);animation:fadeUp .4s ease forwards;opacity:0}
.result-intro{text-align:center;padding:1rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem}
.result-intro h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--dark);margin-bottom:0.35rem}
.result-intro .sub{font-size:11px;color:var(--text-ter);letter-spacing:0.06em;text-transform:uppercase}
.result h3{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;margin:1.5rem 0 0.75rem;padding:8px 14px;border-radius:8px}
.result h3:first-of-type{margin-top:0}
.result h3.r{background:var(--purple-pale);color:#3C3489}
.result h3.c{background:var(--green-pale);color:#085041}
.result h3.v{background:var(--gold-pale);color:#633806}
.result h3.e{background:var(--rose-pale);color:#8B2252}
.result h3.b{background:#F0EBE4;color:#4A3E2C}
.result p{margin-bottom:0.75rem;color:var(--text-sec);font-size:13px}
.result-ilustra{background:var(--cream);border-radius:10px;padding:0.85rem;margin:0.9rem 0;text-align:center}
.result-ilustra svg{max-width:100%}
.result-ilustra .cap{font-size:11px;color:var(--text-ter);margin-top:0.5rem;font-style:italic}
.result-ilustra .subtitle{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-ter);margin-bottom:0.5rem}
.ilustra-grid{display:flex;gap:10px;justify-content:center;align-items:flex-end;flex-wrap:wrap}
.ilustra-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.ilustra-label{font-size:10px;color:var(--text-ter);text-align:center;max-width:75px;line-height:1.3}
.conceito-box{background:linear-gradient(135deg,#FFF8EC,#FAF0D9);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:0.9rem 1rem;margin:1rem 0;font-style:italic;font-size:13px;color:var(--text-sec);line-height:1.7}
.conceito-box strong{color:var(--dark);font-style:normal}
.save-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--dark),#3A2810);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;margin-top:1.25rem;font-family:'DM Sans',sans-serif;transition:opacity .2s}
.save-btn:hover{opacity:.9}
.btn-whats{width:100%;padding:13px;background:linear-gradient(135deg,#1A7C3E,#25A352);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;margin-top:0.75rem;font-family:'DM Sans',sans-serif;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-whats:hover{opacity:.9}
.btn-upsell{width:100%;padding:13px;background:var(--warm);color:var(--dark);border:1.5px solid var(--gold);border-radius:12px;font-size:13.5px;font-weight:500;cursor:pointer;margin-top:0.75rem;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center;text-decoration:none;display:block}
.btn-upsell:hover{background:var(--gold-pale);border-color:var(--dark)}
.feedback-card{background:linear-gradient(135deg,#FFF8EC,#FAF0D9);border:1.5px solid var(--gold);border-radius:14px;padding:1.25rem;margin-top:1.25rem}
.feedback-card h4{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--dark);margin-bottom:0.35rem}
.feedback-card .fb-sub{font-size:12px;color:var(--text-ter);margin-bottom:1rem;line-height:1.55}
.feedback-card input[type=text],.feedback-card textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--dark);outline:none;transition:border-color .2s;margin-bottom:0.6rem;resize:vertical}
.feedback-card input[type=text]:focus,.feedback-card textarea:focus{border-color:var(--gold)}
.feedback-card textarea{min-height:85px;line-height:1.5}
.feedback-card .fb-auth{display:flex;flex-direction:column;gap:6px;margin-bottom:0.85rem;font-size:12px;color:var(--text-sec)}
.feedback-card .fb-auth label{display:flex;align-items:flex-start;gap:7px;cursor:pointer;line-height:1.5}
.feedback-card .fb-auth input[type=radio]{margin-top:3px;accent-color:var(--gold)}
.feedback-card .btn-fb{width:100%;padding:11px;background:linear-gradient(135deg,#1A7C3E,#25A352);color:#fff;border:none;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.feedback-card .btn-fb:hover{opacity:.9}
.feedback-card .fb-success{text-align:center;padding:0.75rem;color:#085041;font-size:13px;font-weight:500}
.btns-wrap{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
.btns-divider{text-align:center;font-size:11px;color:var(--text-ter);margin:0.75rem 0;letter-spacing:0.05em;text-transform:uppercase}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@media print{.header,.progress,.msg.user,.opts,.loading,.btns-wrap,.name-input{display:none!important}.msg.bot{display:none!important}.result{box-shadow:none;border:none;padding:0}.result h3,.result-ilustra,.conceito-box{-webkit-print-color-adjust:exact;print-color-adjust:exact}.result-ilustra{break-inside:avoid}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Dieta <span>Visual</span></div>
    <div class="tagline">Protocolo personalizado · Método Cabelo Comando Visual</div>
    <div class="progress" id="prog"></div>
  </div>
  <div class="chat" id="chat"></div>
</div>
<script>
const A={};
const TOTAL=13;

function upd(n){const p=document.getElementById('prog');p.innerHTML='';for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i<n?' done':i===n?' active':'');p.appendChild(d);}}
function ch(){return document.getElementById('chat')}
function msg(t,tp,d){return new Promise(r=>setTimeout(()=>{const e=document.createElement('div');e.className='msg '+tp;e.innerHTML=t;ch().appendChild(e);ch().scrollTop=99999;r();},d||0));}
function ld(id='ld'){const e=document.createElement('div');e.className='loading';e.id=id;e.innerHTML='<span></span><span></span><span></span>';ch().appendChild(e);ch().scrollTop=99999;}
function ul(id='ld'){const e=document.getElementById(id);if(e)e.remove();}
function opts(os,cb){const w=document.createElement('div');w.className='opts';os.forEach(o=>{const b=document.createElement('button');b.className='opt';b.innerHTML=o.svg?o.svg+`<div><div class="opt-label">${o.label}</div>${o.desc?`<div class="opt-desc">${o.desc}</div>`:''}</div>`:`<div><div class="opt-label">${o.label}</div>${o.desc?`<div class="opt-desc">${o.desc}</div>`:''}</div>`;b.onclick=()=>{w.remove();cb(o);};w.appendChild(b);});ch().appendChild(w);ch().scrollTop=99999;}
function badge(cls,txt){const b=document.createElement('div');b.className='badge-wrap';b.innerHTML=`<span class="badge ${cls}">${txt}</span>`;ch().appendChild(b);}
function nameInput(cb){
  const w=document.createElement('div');w.className='name-input';
  w.innerHTML=`<input type="text" id="nm" placeholder="Digite seu primeiro nome..." autocomplete="given-name"/><button id="nmbtn">Continuar</button>`;
  ch().appendChild(w);ch().scrollTop=99999;
  const inp=document.getElementById('nm'),btn=document.getElementById('nmbtn');
  setTimeout(()=>inp.focus(),200);
  const submit=()=>{const v=inp.value.trim();if(v.length<2)return;w.remove();cb(v);};
  btn.onclick=submit;
  inp.addEventListener('keypress',e=>{if(e.key==='Enter')submit();});
}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}

async function gerarPlano(){

  const ladoCorreto=rostoLongo?A.lado_alto:A.lado_baixo;

  const prompt=`Você é o especialista do Protocolo Dieta Visual — método criado com base em mais de 20 anos de estudo em visagismo e MBA em análise de imagem. Você NÃO menciona nomes próprios em nenhum momento. Você é a voz técnica e acolhedora do método Cabelo Comando Visual.

Você está escrevendo DIRETAMENTE para ${A.nome}. Use o nome dela naturalmente 2-3 vezes ao longo do texto, em momentos de conexão emocional — não em todo parágrafo.

DADOS DE ${A.nome.toUpperCase()}:
- Sobrancelha mais alta: ${A.sobrancelha} (lado alto: ${A.lado_alto} / lado baixo: ${A.lado_baixo})
- Percepção do rosto: ${A.percepcao_rosto}
- Linhas do rosto: ${A.linhas_rosto}
- Usa cabelo ao meio: ${A.cabelo_meio}
- Usa franja: ${A.franja}
- Papada: ${A.papada}
- Biotipo: ${A.biotipo}
- Comprimento: ${A.comprimento}
- Cores das roupas: ${A.cor_roupa}
- Usa cinto: ${A.cinto}
- Tom de pele: ${A.tom_pele}
- Energia desejada: ${A.energia}

CONCEITO CENTRAL QUE DEVE SER FIXADO:
"Tudo são linhas. E toda linha ou é potencializada por linhas iguais/semelhantes, ou é atenuada por linhas opostas/diferentes. Isso vale para o rosto, para o corpo, para a roupa. A verdadeira liberdade de escolha está em ter consciência do que você está escolhendo — reforçar o que você valoriza em si, atenuar o que não está legal segundo a sua ótica."

LEIS A APLICAR:

1. ASSIMETRIA: ${A.lado_alto==='indefinido'?`${A.nome} marcou que NÃO consegue identificar qual sobrancelha é mais alta. Na tela, logo acima do seu texto, já aparece um card visual com o passo a passo do teste da régua para ela descobrir. NÃO REPITA esse passo a passo no texto. Apenas mencione que ela tem a instrução logo acima e siga explicando: se o rosto dela é ${A.percepcao_rosto.toLowerCase()}, ela deve jogar o cabelo para o lado ${rostoLongo?'ALTO (o que tocar a régua primeiro)':'BAIXO (o outro lado, logo abaixo)'} — ${rostoLongo?'equilibra proporções alongadas':'cria linha ascendente que alonga'}.`:`Para ${A.nome}, com rosto ${A.percepcao_rosto.toLowerCase()}, o lado CORRETO para jogar o cabelo é o lado ${ladoCorreto}. ${rostoLongo?'Rosto longo → lado alto → cria efeito de alargamento discreto e equilíbrio':'Rosto largo/redondo → lado baixo → cria linha ascendente que alonga'}. Rosto equilibrado → qualquer lado, explicar ambos os efeitos.`}

2. COMPOSIÇÃO DE LINHAS: O rosto é um conjunto de linhas (maxilar, olhos, sobrancelhas, contorno). Quando você adiciona uma gola, brinco ou posiciona o cabelo, soma mais linhas à composição. Linha IGUAL potencializa. Linha OPOSTA atenua.
- Rosto com linhas RETAS: gola reta potencializa autoridade; gola em V suaviza sem perder força; evitar gola muito arredondada (mulheres com traços marcados rejeitam por empatia visual).
- Rosto com linhas CURVAS: cuidado com excesso de curvas ao redor (golas arredondadas, brincos redondos) pois intensifica percepção de arredondamento. Gola reta ou V equilibra.
- Mistura: flexibilidade para escolher.

3. CABELO AO MEIO: cria linha vertical que espelha o nariz. Se ela usa e o nariz incomoda, dividir de lado atenua. Se nariz arredondado, evitar linhas curvas próximas a ele.

4. FRANJA, GOLA E O ROSTO COMO UNIDADE:
A franja realmente LIMITA — quando a mulher usa franja, ela perde a possibilidade de jogar o cabelo pro lado para alongar OU expandir o rosto lateralmente. Isso é real, mas não é problema: a COMPENSAÇÃO vem pela gola.

Mas a gola não é uma escolha mecânica (V alonga, redonda encurta). A gola trabalha junto com:
- As LINHAS do rosto dela (retas, curvas, diagonais)
- A ENERGIA que ela quer comunicar (autoridade, afeto, dinamismo, sensualidade)

A mulher precisa entender que o ROSTO não termina no queixo. O rosto, visualmente, vai do início da testa (ou da franja, se houver) até onde a gola determina o limite inferior. A gola é a extensão vertical do rosto. Ela redefine as proporções.

Tipos de gola e o que cada uma adiciona:
- Gola em U (curva): adiciona linha curva ao rosto — potencializa delicadeza/envolvência quando rosto tem linhas curvas, atenua rigidez quando rosto tem linhas retas
- Gola em V (diagonal): adiciona diagonal ao rosto — comunica dinamismo, alonga, funciona pra quase todos os rostos
- Gola quadrada/reta (linha horizontal): adiciona estrutura — potencializa autoridade em rostos de linhas retas, atenua suavidade em rostos de linhas curvas

Então a escolha da gola não é sobre "alongar ou encurtar" apenas — é sobre QUE LINHA você adiciona à composição do rosto, e COMO ela dialoga com as linhas que já existem lá e com a energia que a mulher escolheu comunicar.

Para ${A.nome}, que tem rosto com ${A.linhas_rosto} e quer comunicar ${A.energia}: oriente a escolha de gola considerando esses dois fatores, não só o efeito de alongar/encurtar.

5. PAPADA: linha diagonal para trás. QUALQUER linha passando pela região que seja DIFERENTE dessa diagonal atenua (vertical, diagonal oposta, etc). Não limitar a um corte específico.

6. CORPO — OBJETIVO AMPULHETA:
- Linha CÔNCAVA (U/V no corte): retrai cintura, expande quadril → aproxima de ampulheta
- Linha RETA (corte reto horizontal): expande a região onde termina
- Linha CONVEXA (bico, côncavo): espelha diagonal do quadril, expande o quadril
Por biotipo:
- RETÂNGULO: objetivo é criar visualmente a cintura que não existe. O CINTO (ou detalhe escuro marcando a cintura) é ESSENCIAL nesse biotipo — sem ele, não há ampulheta. Quando a mulher usa roupas de baixo contraste (tons parecidos no corpo inteiro), o cinto escuro na cintura é OBRIGATÓRIO para criar o afunilamento por contraste. Sem cinto + roupas de baixo contraste = silhueta fica reta. Complementa com U/V no corte terminando na cintura (converge e cria percepção de cintura). Roupas mais justas revelam o que existe. Deixa claro: para esse biotipo, o cinto não é acessório — é ferramenta estrutural.
- TRIÂNGULO/PÊRA: curto/médio → reto no ombro expande ombros. Longo → U/V afina + cores claras nos ombros
- TRIÂNGULO INVERTIDO: reto no quadril expande parte inferior. Escuro cima, claro baixo
- AMPULHETA: PRESERVAR. U/V reforça. Evitar reta no centro
- OVAL: U/V afina + escuro central + claro lateral + listras verticais

7. COR — LUZ E SOMBRA: onde há LUZ (cor clara), há EXPANSÃO. Onde há SOMBRA (cor escura), há RETRAÇÃO. Aplicar no corpo e no cabelo. Mechas claras próximas à pele AMPLIAM a região (cuidado ombros no triângulo invertido).

8. TOM DE PELE — OBRIGATÓRIO COMENTAR NA ETAPA 3 (Dieta do armário):
O tom de pele é fundamental porque governa TUDO que entra em contato visual direto com o rosto: cor do cabelo, mechas, maquiagem, cor da gola/decote, acessórios (brincos, colares). Você DEVE dedicar pelo menos 2-3 frases dentro da Etapa 3 dando orientação específica sobre o tom de pele dela.

Regras:
- Pele QUENTE (bronzeia, fica dourada/morena): subtom amarelado/oliva/dourado.
  → Harmonia (equilibrar): tons FRIOS com contraste baixo no cabelo (castanho acinzentado, loiro perolado, chocolate frio) + nas roupas próximas ao rosto (lavanda, azul petróleo, rosa antigo) = imagem serena, sofisticada, fluida.
  → Caráter (intensificar): tons QUENTES no cabelo (dourado, cobre, mel, castanho acobreado) + roupas quentes (terracota, mostarda, verde-oliva) = presença afirmativa, calor visual.

- Pele FRIA (fica avermelhada/rosada no sol): subtom rosado/azulado.
  → Harmonia: tons QUENTES suaves (mel quente, cobre claro, castanho quente) + roupas em tons terrosos claros (areia, pêssego, coral suave) = equilíbrio do frio natural da pele.
  → Caráter: tons FRIOS intensos (preto azulado, loiro perolado, castanho cinza) + roupas frias vibrantes (vinho, azul marinho, esmeralda) = presença intensa e elegante.

- Pele NEGRA/MUITO ESCURA: altíssimo contraste funciona muito bem. Cores vibrantes (vermelho, amarelo queimado, esmeralda, azul royal) potencializam. Tons metálicos (dourado, bronze) criam luxo. Evitar tons muito apagados próximo ao rosto — retraem a presença visual.

IMPORTANTE: Comente o tom de pele dela (${A.tom_pele}) dentro da Etapa 3 com orientação ESPECÍFICA — que tons de cabelo e que tons de roupa perto do rosto favorecem ela, E por quê. Não apenas jogue informação, explique o efeito visual que cada escolha causa.

9. ENERGIA DAS FORMAS NO FIO:
- Liso/reto: estrutura, força, estabilidade, autoridade
- Ondulado/curvas: envolvência, afetividade, sensualidade. Contexto da roupa muda a conotação.
- Repicado com movimento: dinamismo, ousadia, energia

10. CABELO CURTO/PRESO E A DESCONSTRUÇÃO DO PRECONCEITO (aplicar se energia = sensualidade OU se comprimento atual é curto OU se ela pensou em cortar curto):
Existe um conceito que precisa ser dito sem rodeios: diferente do que foi enraizado no inconsciente coletivo, cabelo curto ou preso NÃO é masculino — pelo contrário, revela as curvas do corpo. Quando o cabelo está preso ou curto, a NUCA fica exposta e a curva da nuca espelha a curva da LOMBAR (logo acima do bumbum), criando a sensação de bumbum mais projetado pra quem observa de perfil. A crença de que "homem não gosta de mulher de cabelo curto ou preso" vem de ego masculino disfarçado de preferência — originária do inconsciente coletivo que cresceu vendo desenhos do homem das cavernas arrastando a mulher pelos cabelos, totalmente submissa. Quando um homem vê cabelo curto ou preso, o inconsciente dele sente perda de dominância. Mas quando ele tira esse véu e para de ouvir o ego, finalmente percebe a real sensualidade da mulher — revelada pelas curvas que o cabelo longo cobria. Explique isso com tom revelador e libertador, não combativo. A escolha de cobrir ou revelar é dela.

- 1200 a 1500 palavras TOTAL
- Em cada seção, começar direto no conteúdo, sem repetir o título`;

// ==================== PDF ====================

function gerarPDF(){
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight();
    const margin=20,maxW=pageW-margin*2;let y=20;
    doc.setFillColor(28,20,16);doc.rect(0,0,pageW,32,'F');
    doc.setTextColor(250,247,242);doc.setFontSize(22);doc.setFont('helvetica','bold');
    doc.text('Dieta Visual',margin,16);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(196,151,58);
    doc.text('PROTOCOLO PERSONALIZADO · MÉTODO CABELO COMANDO VISUAL',margin,23);
    doc.setFontSize(10);doc.setTextColor(250,247,242);
    doc.text(`Preparado para: ${A.nome}`,margin,29);
    const hoje=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    doc.setFontSize(8);doc.setTextColor(196,151,58);
    doc.text(hoje,pageW-margin,29,{align:'right'});
    y=42;
    const result=document.querySelector('.result');
    if(!result){alert('Complete o quiz primeiro.');return;}
    result.querySelectorAll('h3,p,.conceito-box').forEach(el=>{
      if(el.tagName==='H3'){
        if(y>pageH-40){doc.addPage();y=20;}
        y+=6;
        const tt=el.textContent.trim();
        if(tt.includes('Etapa 1'))doc.setFillColor(238,237,254);
        else if(tt.includes('Etapa 2'))doc.setFillColor(225,245,238);
        else if(tt.includes('Etapa 3'))doc.setFillColor(250,238,218);
        else if(tt.toLowerCase().includes('energia'))doc.setFillColor(251,234,240);
        else doc.setFillColor(240,235,228);
        doc.roundedRect(margin,y,maxW,11,2,2,'F');
        if(tt.includes('Etapa 1'))doc.setTextColor(60,52,137);
        else if(tt.includes('Etapa 2'))doc.setTextColor(8,80,65);
        else if(tt.includes('Etapa 3'))doc.setTextColor(99,56,6);
        else if(tt.toLowerCase().includes('energia'))doc.setTextColor(139,34,82);
        else doc.setTextColor(74,62,44);
        doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text(tt,margin+4,y+7.5);y+=16;
      } else if(el.classList.contains('conceito-box')){
        const tx=el.textContent.trim();if(!tx)return;
        doc.setFillColor(255,248,236);
        const lines=doc.splitTextToSize(tx,maxW-8),bh=lines.length*4.8+6;
        if(y+bh>pageH-20){doc.addPage();y=20;}
        doc.roundedRect(margin,y,maxW,bh,2,2,'F');
        doc.setFillColor(196,151,58);doc.rect(margin,y,1.5,bh,'F');
        doc.setTextColor(58,46,32);doc.setFontSize(9);doc.setFont('helvetica','italic');
        doc.text(lines,margin+5,y+5);y+=bh+4;
      } else if(el.tagName==='P'){
        const tx=el.textContent.trim();if(!tx)return;
        doc.setTextColor(58,46,32);doc.setFontSize(10);doc.setFont('helvetica','normal');
        const lines=doc.splitTextToSize(tx,maxW),bh=lines.length*5.5;
        if(y+bh>pageH-20){doc.addPage();y=20;}
        doc.text(lines,margin,y);y+=bh+4;
      }
    });
    const tp=doc.internal.getNumberOfPages();
    for(let i=1;i<=tp;i++){
      doc.setPage(i);doc.setDrawColor(232,221,208);
      doc.line(margin,pageH-14,pageW-margin,pageH-14);
      doc.setFontSize(7.5);doc.setTextColor(122,106,84);doc.setFont('helvetica','normal');
      doc.text(`${A.nome} · ossegredosdaimagem.com · Protocolo Dieta Visual`,margin,pageH-8);
      doc.text(`${i}/${tp}`,pageW-margin,pageH-8,{align:'right'});
    }
    doc.save(`Protocolo-Dieta-Visual-${A.nome}.pdf`);
  }catch(err){
    alert('Para salvar como PDF: na janela que vai abrir, escolha "Salvar como PDF".');
    window.print();
  }
}

function enviarFeedback(){
  const nome=document.getElementById('fb-nome').value.trim()||'Anônima';
  const texto=document.getElementById('fb-texto').value.trim();
  const autorizRadio=document.querySelector('input[name="fb-autoriz"]:checked');

  if(autoriz==='publicar-nome')autorizTxt='✅ Pode publicar com meu primeiro nome';
  else if(autoriz==='publicar-anonimo')autorizTxt='✅ Pode publicar anonimamente';

  const phone='5547992883177';

  const card=document.getElementById('fb-card');
